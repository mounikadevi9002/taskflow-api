$kind: http-request
url: localhost:5000/api/tasks/{{taskId}}
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: '{ "text": "Buy groceries and milk", "completed": true }'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Task updated', () => {
        const body = pm.response.json();
        pm.expect(body.text).to.eql('Buy groceries and milk');
        pm.expect(body.completed).to.be.true;
      });
    language: text/javascript
order: 6000
